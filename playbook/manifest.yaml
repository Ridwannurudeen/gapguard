name: gapguard-aaplusdt-rwa-perp-reversion
display_name: "GapGuard AAPLUSDT RWA Perp Reversion"
description: "Deterministic Bitget AAPLUSDT RWA perp reversion Playbook"
version: "0.2.0"
long_description: |
  GapGuard AAPLUSDT RWA Perp Reversion is the managed backtest package for the
  tokenized-stock evidence path. It replaces the earlier ordinary-equity sanity
  check with exchange-native Bitget contract data and keeps the reasoning layer
  out of the historical strategy. The package reads AAPLUSDT futures candles from
  the managed crypto kline provider, converts those rows into a Nautilus replay,
  and emits a signal with the resulting return, drawdown, trade count, and chart
  artifact.

  The thesis is that sharp candle-to-candle dislocations in a new RWA perp can
  overshoot when narrative demand arrives faster than balanced positioning. The
  objective is not to predict the equity itself; it is to test whether the perp
  microstructure briefly stretches away from the previous close and then mean
  reverts once liquidity catches up. That keeps the backtest falsifiable and
  avoids letting an agent explain away a bad result after the fact.

  The strategy is intentionally simple. It watches the current candle open
  against the previous candle close. When the move is stretched upward, it fades
  short; when the move is stretched downward, it fades long. Positions are held
  for a short fixed window and then closed, so the backtest measures whether the
  RWA perp tends to retrace sharp candle-to-candle dislocations without asking an
  LLM to pick direction.

  Entry logic is mechanical. The strategy enters short when the candle opens far
  above the prior close, enters long when it opens far below the prior close, and
  otherwise stays flat. Exit logic is also mechanical: once a position has been
  open for the configured holding window, the strategy closes it at market and
  waits for the next setup. Every order comes from the candle data and fixed
  parameters in the manifest.

  This Playbook is supporting evidence for Agent Arena rather than a claim of
  live stock execution. The arena uses simulated and paper broker evidence for
  safe demo operation, and live RWA trading remains gated behind a licensed
  passport, explicit confirmation, isolated margin, and manual approval. If the
  managed kline probe ever returns empty rows, the project must mark backtest
  support as unavailable and rely on the simulated and paper evidence instead.

  Subscribers can tune symbol, dislocation sensitivity, holding window, trade
  size, and margin budget. Larger sensitivity values trade fewer moves; longer
  holding windows give reversion more time but increase exposure to fresh news.
market_type: contract
trading_symbols: ["AAPLUSDT"]
tags: ["mean-reversion", "rwa", "contract", "bitget"]

decision_mode: deterministic
backtest_support: full
runtime_profile: deterministic
execution_mode: signal_only
follow_trade_supported: false

strategy_config:
  trading_symbols: ["AAPLUSDT"]
  proof_scope: "bitget_aaplusdt_rwa_perp_backtest"
  exchange: "bitget"
  interval: "1h"
  gap_threshold_pct: 0.004
  hold_bars: 4
  trade_size: "0.03"
  margin_budget: "1000"

user_config_schema:
  trading_symbols:
    type: array
    item_type: string
    default: ["AAPLUSDT"]
    options: ["AAPLUSDT"]
    min_items: 1
    max_items: 1
    label: "Trading symbol"
  gap_threshold_pct:
    type: number
    default: 0.004
    min: 0.001
    max: 0.05
    label: "Dislocation threshold"
  hold_bars:
    type: integer
    default: 4
    min: 1
    max: 24
    label: "Holding bars"
  trade_size:
    type: string
    default: "0.03"
    pattern: "^[0-9]+(\\.[0-9]+)?$"
    label: "Contracts per trade"
  margin_budget:
    type: string
    default: "1000"
    pattern: "^[0-9]+(\\.[0-9]+)?$"
    label: "Margin budget USDT"
