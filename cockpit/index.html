<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GapGuard — Gap-Risk Control Tower</title>
<style>
  :root {
    --bg: #0b0e14; --panel: #131823; --line: #232a38; --ink: #e6edf3; --dim: #8b97a8;
    --rich: #ff6b6b; --cheap: #4dd4ac; --fair: #6b7689; --gold: #f5c451;
    --ok: #3fb950; --bad: #ff5c5c; --accent: #5aa9ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 28px 20px 60px; }
  header { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  h1 { font-size: 20px; margin: 0; letter-spacing: .2px; }
  h1 .tag { color: var(--dim); font-weight: 400; font-size: 14px; }
  .meta { color: var(--dim); font-size: 12.5px; margin: 6px 0 18px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .meta b { color: var(--ink); font-weight: 600; }
  .badge {
    display: inline-flex; align-items: center; gap: 7px; padding: 5px 12px; border-radius: 999px;
    font-weight: 700; font-size: 12.5px; letter-spacing: .3px; border: 1px solid transparent;
  }
  .badge.ok { color: var(--ok); background: rgba(63,185,80,.10); border-color: rgba(63,185,80,.35); }
  .badge.bad { color: var(--bad); background: rgba(255,92,92,.10); border-color: rgba(255,92,92,.4); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; box-shadow: 0 0 8px currentColor; }
  .controls { display: flex; align-items: center; gap: 16px; margin: 4px 0 18px; flex-wrap: wrap; }
  .controls label { color: var(--dim); font-size: 13px; display: inline-flex; align-items: center; gap: 7px; cursor: pointer; }
  table { width: 100%; border-collapse: collapse; background: var(--panel); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
  th, td { padding: 11px 13px; text-align: left; border-bottom: 1px solid var(--line); white-space: nowrap; }
  th { color: var(--dim); font-weight: 600; font-size: 11.5px; text-transform: uppercase; letter-spacing: .5px; }
  td { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; }
  tr:last-child td { border-bottom: none; }
  tr.broken td { background: rgba(255,92,92,.07); }
  .num { text-align: right; }
  .pill { display: inline-block; padding: 2px 9px; border-radius: 6px; font-size: 11.5px; font-weight: 700; letter-spacing: .2px; }
  .s-regular { background: rgba(90,169,255,.16); color: var(--accent); }
  .s-pre, .s-post, .s-overnight { background: rgba(245,196,81,.14); color: var(--gold); }
  .s-weekend, .s-holiday { background: rgba(139,118,160,.18); color: #c7b3e0; }
  .d-rich { color: var(--rich); } .d-cheap { color: var(--cheap); } .d-fair { color: var(--fair); }
  .a-enter_short, .a-enter_long { color: var(--gold); font-weight: 700; }
  .a-flatten { color: var(--accent); font-weight: 700; }
  .a-reduce { color: #d9a441; } .a-hold { color: var(--dim); }
  .hash { color: var(--dim); }
  .link td { background: rgba(63,185,80,.04); }
  .drop {
    margin-top: 26px; padding: 40px; border: 1.5px dashed var(--line); border-radius: 12px;
    text-align: center; color: var(--dim); background: var(--panel);
  }
  .drop.hot { border-color: var(--accent); color: var(--ink); }
  .drop input { display: none; }
  .drop b { color: var(--accent); cursor: pointer; text-decoration: underline; }
  .foot { margin-top: 16px; color: var(--dim); font-size: 12.5px; font-family: ui-monospace, monospace; }
  .err { color: var(--bad); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>GapGuard <span class="tag">· gap-risk control tower</span></h1>
    <span id="chainBadge" class="badge ok" style="margin-left:auto"><span class="dot"></span><span id="chainText">awaiting log…</span></span>
  </header>
  <div class="meta" id="meta">Load a <code>glassbox-demo.jsonl</code> produced by <b>npm run demo</b>.</div>

  <div class="controls" id="controls" hidden>
    <label><input type="checkbox" id="tamper" /> Simulate tampering with record #1 (flip its target notional)</label>
  </div>

  <table id="tbl" hidden>
    <thead>
      <tr>
        <th>Time (ET)</th><th>Session</th><th class="num">Token</th><th class="num">Fair value</th>
        <th class="num">Gap (z)</th><th>Read</th><th>Gate</th><th>Action</th><th class="num">Target</th><th>recordHash</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
  <div class="foot" id="foot" hidden></div>

  <div class="drop" id="drop">
    Drop <b id="pick">glassbox-demo.jsonl</b> here to load the audit trail.
    <input type="file" id="file" accept=".jsonl,.json,.txt" />
    <div style="margin-top:10px;font-size:12px">Tip: run a static server at the repo root and this loads automatically.</div>
  </div>
</div>

<script>
const GENESIS = "0".repeat(64);
let original = null; // pristine records for the tamper toggle to restore from

// Must byte-match src/glassbox.ts canonicalPayload: JSON.stringify of payload fields in this order.
function canonicalPayload(r) {
  const base = { ts: r.ts, symbol: r.symbol, session: r.session, dislocation: r.dislocation, risk: r.risk };
  if (r.gate) base.gate = r.gate;
  return JSON.stringify(base);
}
async function sha256hex(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, "0")).join("");
}
async function verifyChain(records) {
  let prev = GENESIS, allOk = true;
  const perRecord = [];
  for (const r of records) {
    const expected = await sha256hex(canonicalPayload(r) + prev);
    const ok = r.prevHash === prev && r.recordHash === expected;
    perRecord.push(ok); allOk = allOk && ok;
    prev = r.recordHash; // continue on the stored hash so a single break is localized
  }
  return { allOk, perRecord };
}

function parseJsonl(text) {
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean).map(l => JSON.parse(l));
  const meta = lines.length && lines[0]._meta ? lines.shift()._meta : null;
  return { meta, records: lines };
}

const fmt = n => (n >= 0 ? "+" : "") + n.toFixed(2);
const esc = s => String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));

async function render(meta, records) {
  const { allOk, perRecord } = await verifyChain(records);

  const badge = document.getElementById("chainBadge");
  badge.className = "badge " + (allOk ? "ok" : "bad");
  document.getElementById("chainText").textContent =
    allOk ? `CHAIN VERIFIED · ${records.length} records` : "CHAIN TAMPERED — verification failed";

  document.getElementById("meta").innerHTML = meta
    ? `commit <b>${esc(meta.commit)}</b> · generated <b>${esc(meta.generatedAt)}</b> · sha256-linked glass box`
    : `${records.length} records · sha256-linked glass box (no header)`;

  const rows = records.map((r, i) => {
    const d = r.dislocation, rk = r.risk, se = r.session;
    const token = d.fairValue * (1 + d.dislocationPct);
    const gate = r.gate ? `×${r.gate.multiplier.toFixed(2)}` : "—";
    return `<tr class="${perRecord[i] ? "" : "broken"}">
      <td>${esc(se.etTime.replace(" ET", ""))}</td>
      <td><span class="pill s-${esc(se.session)}">${esc(se.session)}</span></td>
      <td class="num">${token.toFixed(2)}</td>
      <td class="num">${d.fairValue.toFixed(2)}</td>
      <td class="num">${d.zScore.toFixed(2)}σ</td>
      <td class="d-${esc(d.direction)}">${esc(d.direction)} ${(d.confidence * 100).toFixed(0)}%</td>
      <td>${esc(gate)}</td>
      <td class="a-${esc(rk.action)}">${esc(rk.action)}</td>
      <td class="num">${fmt(rk.targetNotional)}</td>
      <td class="hash">${perRecord[i] ? "" : "⚠ "}${esc(r.recordHash.slice(0, 10))}…</td>
    </tr>`;
  }).join("");
  document.getElementById("rows").innerHTML = rows;

  for (const id of ["controls", "tbl", "foot"]) document.getElementById(id).hidden = false;
  document.getElementById("drop").hidden = true;
  const shorts = records.filter(r => r.risk.action.startsWith("enter")).length;
  document.getElementById("foot").textContent =
    `${records.length} decisions · ${shorts} convergence entries · chain anchored at GENESIS (${GENESIS.slice(0,8)}…)`;
}

async function load(text) {
  try {
    const { meta, records } = parseJsonl(text);
    if (!records.length) throw new Error("no decision records found");
    original = JSON.parse(JSON.stringify(records));
    window._meta = meta;
    await render(meta, records);
    document.getElementById("tamper").checked = false;
  } catch (e) {
    document.getElementById("meta").innerHTML = `<span class="err">Could not read log: ${esc(e.message)}</span>`;
  }
}

document.getElementById("tamper").addEventListener("change", e => {
  if (!original) return;
  const records = JSON.parse(JSON.stringify(original));
  if (e.target.checked) records[0].risk.targetNotional += 1; // alter a sealed payload field
  render(window._meta, records);
});

// File-drop + picker fallback (works from file://)
const drop = document.getElementById("drop"), fileInput = document.getElementById("file");
document.getElementById("pick").addEventListener("click", () => fileInput.click());
fileInput.addEventListener("change", e => e.target.files[0]?.text().then(load));
["dragover", "dragenter"].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add("hot"); }));
["dragleave", "drop"].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove("hot"); }));
drop.addEventListener("drop", e => e.dataTransfer.files[0]?.text().then(load));

// Auto-load when served over http (sibling, then repo root)
(async () => {
  for (const url of ["glassbox-demo.jsonl", "../glassbox-demo.jsonl"]) {
    try { const res = await fetch(url); if (res.ok) return load(await res.text()); } catch {}
  }
})();
</script>
</body>
</html>
